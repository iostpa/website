<!DOCTYPE html>

      <div class="text-lg">

        </p>

        <div class="flex justify-center">
          <!-- prettier-ignore -->
          <ul class="text-left list-inside list-disc w-3/4" id="list">
            <li><a href="https://is-a.dev" class="text-amber-400 underline hover:text-amber-600">is-a.dev</a>, owned by wdhdev</li>

        <p id="contact">

          <a
            href="mailto:iostpa@iostpa.com"
            class="text-amber-400 underline hover:text-amber-600"

          <a
            href="https://iostpa.com/bluesky"
            class="text-amber-400 underline hover:text-amber-600"
            >Bluesky</a

          <a
            href="https://iostpa.com/twitter"
            class="text-amber-400 underline hover:text-amber-600"

          <a
            href="https://iostpa.com/discord"
            class="text-amber-400 underline hover:text-amber-600"
            >Discord</a
          >.
        </p>

        <div class="flex justify-center items-center my-12" id="lanyard">
          <img
            src="https://lanyard.cnrad.dev/api/716306888492318790?bg=16191d"
            alt="Discord Status"
            class="border border-amber-400 hover:border-amber-600 hover:scale-105 rounded-4xl cursor-pointer transition-all"
          />

        <div class="flex gap-8 justify-center" id="socials">
          <a
            href="https://iostpa.com/twitter"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="img/twitter.svg" alt="Twitter Logo" />
          </a>
          <a
            href="https://iostpa.com/youtube"
            target="_blank"
            rel="noopener noreferrer"
          >

          <a

            target="_blank"
            rel="noopener noreferrer"
            class="socials"
          >

          <a
            href="https://iostpa.com/bluesky"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="img/bluesky.svg" alt="Bluesky Logo" class="w-8" />

    <div class="relative">

  <script>

      document.getElementById("socials").remove();

  </script>
</html>
